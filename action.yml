name: Slack Notification
description: Send rich formatted messages to any Slack channel using a Slack bot
author: Your name or organization here

# Add your action's branding here. This will appear on the GitHub Marketplace.
branding:
  icon: message-circle
  color: green

# Define your inputs here.
inputs:
  slack-bot-token:
    description:
      'Slack Bot Token (xoxb-...) for authenticating with the Slack API'
    required: true
  channel-id:
    description:
      'Slack channel ID (e.g., C1234567890) where the message should be sent'
    required: true
  message:
    description: 'Message content to send. Supports Slack markdown formatting'
    required: true
  thread-ts:
    description: 'Optional timestamp of the parent message to reply in thread'
    required: false
  unfurl-links:
    description:
      'Whether to unfurl links in the message (true/false, defaults to true)'
    required: false
    default: 'true'
  unfurl-media:
    description:
      'Whether to unfurl media in the message (true/false, defaults to true)'
    required: false
    default: 'true'

# Define your outputs here.
outputs:
  message-ts:
    description: 'Timestamp of the sent message'
  channel:
    description: 'Channel where the message was sent'
  permalink:
    description: 'Permalink to the sent message'

runs:
  using: node20
  main: dist/index.js
